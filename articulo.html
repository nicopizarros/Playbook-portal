<!-- Vercel Web Analytics. Ver nota en index.html — el shim de window.va
     va antes de script.js y de cualquier módulo que llame a va(...) (ver
     js/article-page.js, evento pageview_article). Corre en paralelo a GA4. -->
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
<!-- Tema oscuro: debe ejecutarse antes de que carguen las hojas de estilo
     para evitar el parpadeo (FOUC). Lee localStorage de forma síncrona; si
     no hay preferencia guardada, no setea data-theme y deja que
     @media(prefers-color-scheme:dark) en css/tokens.css decida solo. -->
<script>
  (function(){
    try{
      var t=localStorage.getItem('playbook_theme');
      if(t==='dark'||t==='light'){document.documentElement.setAttribute('data-theme',t);}
    }catch(e){}
  })();
</script>
<!-- Título y meta genéricos: fallback para cualquier request que llegue con
     esta plantilla sin pasar por api/article-page.js (ver ese archivo). Ese
     endpoint reescribe estas mismas etiquetas por request, con los datos
     reales del artículo, para bots que no ejecutan JS (WhatsApp, X,
     Facebook, Slack, etc.) — matchea por el atributo name/property de cada
     <meta>, así que no reordenes esos atributos sin revisar los regex ahí.
     Para lectores humanos, js/article-page.js hace lo mismo del lado del
     cliente (ver applyArticleSeo). -->
