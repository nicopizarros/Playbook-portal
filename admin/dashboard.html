<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Playbook — Panel de contenido</title>
<meta name="robots" content="noindex, nofollow" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'" />
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" /></noscript>

<link rel="stylesheet" href="/css/reset.css" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/layout.css" />
<link rel="stylesheet" href="/css/components.css" />
<link rel="stylesheet" href="/css/header.css" />
<link rel="stylesheet" href="/css/hero.css" />
<link rel="stylesheet" href="/css/sections.css" />
<link rel="stylesheet" href="/css/responsive.css" />
<link rel="stylesheet" href="/admin/admin.css" />
</head>
<body class="admin-body">
<script>
  if (!sessionStorage.getItem('playbook_admin_token')) {
    window.location.replace('/admin');
  }
</script>

<div id="editor-screen" class="admin-editor">
  <header class="admin-topbar">
    <div class="admin-topbar-brand">
      <img src="/assets/img/playbook-logo.webp" width="140" height="34" alt="Playbook" />
      <span>Panel de contenido</span>
    </div>
    <div class="admin-topbar-actions">
      <span class="admin-status" id="admin-whoami"></span>
      <span class="admin-status" id="admin-status" role="status"></span>
      <button type="button" class="btn admin-save-btn" id="save-btn">
        <span id="save-btn-label">Guardar cambios</span>
        <span class="dirty-dot" id="dirty-dot" hidden aria-label="Cambios sin guardar" title="Cambios sin guardar"></span>
      </button>
      <button type="button" class="btn light" id="logout-btn">Salir</button>
    </div>
  </header>

  <div class="admin-body-grid">
    <nav class="admin-tabs" id="admin-tabs" aria-label="Secciones del sitio"></nav>

    <main class="admin-main">
      <section class="admin-form-pane" id="admin-form-pane" aria-label="Edición de contenido"></section>
      <aside class="admin-preview-pane" aria-label="Vista previa en vivo">
        <div class="admin-preview-toolbar">
          <div class="admin-preview-label">Vista previa en vivo</div>
          <label class="admin-compare-toggle">
            <input type="checkbox" id="compare-toggle" />
            <span>Comparar con lo publicado</span>
          </label>
        </div>
        <div class="admin-preview-body" id="admin-preview-body">
          <div class="admin-preview-col" id="preview-col-live" data-prefix="preview">
            <div id="preview-articles-head" class="section-head reveal is-visible" style="padding-top:0;"></div>
            <div class="news-list" id="preview-articles-list"></div>

            <div id="preview-opinion-head" class="section-head reveal is-visible"></div>
            <div id="preview-opinion-grid" class="opinion-grid"></div>

            <div id="preview-products-head" class="section-head reveal is-visible" style="padding-top:0;"></div>
            <div id="preview-products-grid" class="product-grid"></div>

            <div class="mid-cta-box reveal is-visible" id="preview-mid-cta"></div>

            <div id="preview-video-head" class="section-head reveal is-visible"></div>
            <div class="video-feature-card reveal is-visible" id="preview-video-feature"></div>
            <div class="video-feature-copy reveal is-visible" id="preview-video-feature-copy"></div>
            <div class="clips-row" id="preview-video-clips"></div>

            <div id="preview-infinitas-head" class="section-head reveal is-visible" style="padding-top:0;"></div>
            <div class="infinitas-wrap" id="preview-infinitas-wrap"></div>

            <h2 id="preview-stats-heading" style="font-family:var(--serif-display);font-weight:400;font-size:22px;text-transform:uppercase;"></h2>
            <div class="proof-grid" id="preview-stats-grid"></div>

            <div id="preview-testimonials-head" class="section-head reveal is-visible" style="padding-top:0;"></div>
            <div class="testimonial-grid" id="preview-testimonials-grid"></div>

            <div class="about-card" id="preview-about-card"></div>

            <footer style="border-radius:14px;">
              <div class="footer-grid" id="preview-footer-content"></div>
              <div class="footer-copyright" id="preview-footer-copyright"></div>
            </footer>
          </div>

          <div class="admin-preview-col admin-preview-col-baseline" id="preview-col-baseline" data-prefix="preview-base" hidden>
            <div class="admin-preview-col-tag">Publicado ahora</div>
            <div id="preview-base-articles-head" class="section-head reveal is-visible" style="padding-top:0;"></div>
            <div class="news-list" id="preview-base-articles-list"></div>

            <div id="preview-base-opinion-head" class="section-head reveal is-visible"></div>
            <div id="preview-base-opinion-grid" class="opinion-grid"></div>

            <div id="preview-base-products-head" class="section-head reveal is-visible" style="padding-top:0;"></div>
            <div id="preview-base-products-grid" class="product-grid"></div>

            <div class="mid-cta-box reveal is-visible" id="preview-base-mid-cta"></div>

            <div id="preview-base-video-head" class="section-head reveal is-visible"></div>
            <div class="video-feature-card reveal is-visible" id="preview-base-video-feature"></div>
            <div class="video-feature-copy reveal is-visible" id="preview-base-video-feature-copy"></div>
            <div class="clips-row" id="preview-base-video-clips"></div>

            <div id="preview-base-infinitas-head" class="section-head reveal is-visible" style="padding-top:0;"></div>
            <div class="infinitas-wrap" id="preview-base-infinitas-wrap"></div>

            <h2 id="preview-base-stats-heading" style="font-family:var(--serif-display);font-weight:400;font-size:22px;text-transform:uppercase;"></h2>
            <div class="proof-grid" id="preview-base-stats-grid"></div>

            <div id="preview-base-testimonials-head" class="section-head reveal is-visible" style="padding-top:0;"></div>
            <div class="testimonial-grid" id="preview-base-testimonials-grid"></div>

            <div class="about-card" id="preview-base-about-card"></div>

            <footer style="border-radius:14px;">
              <div class="footer-grid" id="preview-base-footer-content"></div>
              <div class="footer-copyright" id="preview-base-footer-copyright"></div>
            </footer>
          </div>
        </div>
      </aside>
    </main>
  </div>
</div>

<div class="admin-toast-stack" id="toast-stack" aria-live="polite"></div>

<div class="admin-modal-overlay" id="conflict-modal" hidden>
  <div class="admin-modal" role="alertdialog" aria-labelledby="conflict-modal-title">
    <h2 id="conflict-modal-title">⚠️ Alguien más guardó primero</h2>
    <p>Otra persona del equipo guardó cambios en esta misma sección mientras editabas. Para evitar sobrescribir su trabajo, vamos a recargar la última versión publicada — vas a tener que rehacer tu cambio.</p>
    <button type="button" class="btn accent" id="conflict-modal-reload">Entendido, recargar</button>
  </div>
</div>

<script type="module" src="/admin/dashboard.js"></script>
</body>
</html>
