<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Playbook — Acceso al panel</title>
<meta name="robots" content="noindex, nofollow" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'" />
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" /></noscript>

<link rel="stylesheet" href="/css/reset.css" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/admin/admin.css" />
</head>
<body class="admin-body admin-body-login">

<div id="login-screen" class="admin-login">
  <form id="login-form" class="admin-login-card">
    <img src="/assets/img/playbook-logo.webp" width="180" height="44" alt="Playbook" class="admin-login-logo" />
    <h1>Panel de contenido</h1>
    <p class="admin-login-sub">Acceso para el equipo editorial de Playbook.</p>
    <label class="admin-field">
      <span>Usuario</span>
      <input type="text" id="login-username" autocomplete="username" placeholder="aldo / nico / guillermo" required />
    </label>
    <label class="admin-field">
      <span>Contraseña</span>
      <input type="password" id="login-password" autocomplete="current-password" required />
    </label>
    <button type="submit" class="btn accent admin-login-submit" id="login-submit">Entrar</button>
    <p class="admin-error" id="login-error" role="alert"></p>
  </form>
</div>

<script type="module" src="/admin/login.js"></script>
</body>
</html>
