<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Playbook — Analítica</title>
<meta name="robots" content="noindex, nofollow" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'" />
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" /></noscript>

<link rel="stylesheet" href="/css/reset.css" />
<link rel="stylesheet" href="/css/tokens.css" />
<link rel="stylesheet" href="/css/layout.css" />
<link rel="stylesheet" href="/css/components.css" />
<link rel="stylesheet" href="/css/header.css" />
<link rel="stylesheet" href="/css/hero.css" />
<link rel="stylesheet" href="/css/sections.css" />
<link rel="stylesheet" href="/admin/admin.css" />

<!-- Chart.js vía CDN, a pedido explícito — sin paquete npm, este sitio no
     tiene paso de build. Es la única dependencia de terceros de todo el
     panel; si alguna vez se cae el CDN, la página sigue funcionando (las
     tarjetas y tablas no dependen de Chart.js, solo las dos barras). -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body class="admin-body">
<script>
  if (!sessionStorage.getItem('playbook_admin_token')) {
    window.location.replace('/admin');
  }
</script>

<div class="admin-editor">
  <header class="admin-topbar">
    <div class="admin-topbar-brand">
      <img src="/assets/img/playbook-logo.webp" width="140" height="34" alt="Playbook" />
      <span>Panel de contenido</span>
    </div>
    <div class="admin-topbar-actions">
      <span class="admin-status" id="admin-whoami"></span>
      <span class="admin-status" id="admin-status" role="status"></span>
      <button type="button" class="btn light" id="logout-btn">Salir</button>
    </div>
  </header>

  <div class="admin-body-grid">
    <nav class="admin-tabs" aria-label="Secciones del panel">
      <a class="admin-tab" href="/admin/dashboard">
        <span class="admin-tab-label">Contenido</span>
      </a>
      <a class="admin-tab is-active" href="/admin/analytics.html" aria-current="page">
        <span class="admin-tab-label">Analítica</span>
      </a>
    </nav>

    <main class="admin-main analytics-main">
      <div class="analytics-page">

        <div class="analytics-head">
          <div>
            <h1 class="admin-section-title" style="margin:0;">Analítica</h1>
            <p class="admin-section-desc" style="margin:4px 0 0;">Datos de Vercel Web Analytics. Corre en paralelo a GA4 — es la vista rápida para el día a día del equipo.</p>
          </div>
          <div class="analytics-head-actions">
            <span class="analytics-updated" id="analytics-updated">Cargando…</span>
            <button type="button" class="btn-mini" id="analytics-refresh">Actualizar</button>
          </div>
        </div>

        <div class="analytics-kpi-grid" id="analytics-kpis">
          <div class="analytics-kpi-card is-loading"><div class="skel" style="height:90px;border-radius:10px;"></div></div>
          <div class="analytics-kpi-card is-loading"><div class="skel" style="height:90px;border-radius:10px;"></div></div>
          <div class="analytics-kpi-card is-loading"><div class="skel" style="height:90px;border-radius:10px;"></div></div>
        </div>

        <div class="analytics-panel-grid">
          <section class="analytics-panel" id="panel-top-articles">
            <h2 class="analytics-panel-title">Artículos más leídos <span class="analytics-panel-sub">últimos 30 días</span></h2>
            <div class="analytics-panel-body">
              <div class="skel" style="height:220px;border-radius:10px;"></div>
            </div>
          </section>

          <section class="analytics-panel" id="panel-referrers">
            <h2 class="analytics-panel-title">Referrers principales <span class="analytics-panel-sub">últimos 30 días</span></h2>
            <div class="analytics-panel-body">
              <div class="skel" style="height:220px;border-radius:10px;"></div>
            </div>
          </section>

          <section class="analytics-panel" id="panel-countries">
            <h2 class="analytics-panel-title">Países <span class="analytics-panel-sub">últimos 30 días</span></h2>
            <div class="analytics-panel-body">
              <div class="skel" style="height:160px;border-radius:10px;"></div>
            </div>
          </section>

          <section class="analytics-panel" id="panel-devices">
            <h2 class="analytics-panel-title">Dispositivos <span class="analytics-panel-sub">últimos 30 días</span></h2>
            <div class="analytics-panel-body">
              <div class="skel" style="height:160px;border-radius:10px;"></div>
            </div>
          </section>
        </div>

      </div>
    </main>
  </div>
</div>

<div class="admin-toast-stack" id="toast-stack" aria-live="polite"></div>

<script type="module" src="/admin/analytics.js"></script>
</body>
</html>
